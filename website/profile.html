<!doctype html>
<html>
  <head>
    <meta charset="utf8">
    <!--if javascript is not supported, the webpage will be exchange to index.html-->
    <noscript>
      <meta http-equiv="refresh" content="0;url=./index.html"-->
    </noscript>
    <!--include the Bootstrap core-->
    <link rel="stylesheet" href="../src/framework/bootstrap/css/bootstrap.min.css">
    <script src="../src/framework/bootstrap/jquery-3.5.1.slim.min.js"></script>
    <script src="../src/framework/bootstrap/js/bootstrap.bundle.min.js"></script>
    <!--include the Vue core-->
    <script src="../src/framework/vue/vue.global.prod.js"></script>
    <!--include the customed files-->
    <link rel="stylesheet" href="base.css">
    <script src="base.js"></script>
    <!--Other settings-->
  </head>
  
  <body id="app">
    <header></header>

    <nav v-html="mNavbarHtml"></nav>

    <main class="user-select-none">
      <div class="container">
        <div class="btn-group" role="group">
          <button type="button" class="btn btn-outline-info customedBtn" v-for="item in mTabBtnInfo" :id="item[0]" v-text="item[1]" @click="btnEvent($event)"></button>
        </div>

        <div class="content" v-html="mContentHtml">
        </div>
      </div>
    </main>

    <footer v-html="mFooterHtml"></footer>

    <script>
      $(document).ready(function(){
        common();
        $('[data-toggle="tooltip"]').tooltip();
        setActiveNavbarItem('profile');
      });

      Vue.createApp({
        data() {
          return {
            mNavbarHtml: 'Nav Bar',
            mFooterHtml: 'Copyright', 
            mContentHtml: 'Welcome to the New Blog!', 
            mTabBtnInfo: [
              ['aboutTabBtn', '簡介'], 
              ['expTabBtn', '經歷'],
              ['autobiographyTabBtn', '自傳'],
              ['portfolioTabBtn', '作品展示']
            ]
          }
        },
        mounted() {
          this.mNavbarHtml = getNavbarHtml();
          this.mFooterHtml = getCopyrightHtml();
          this.mContentHtml = getAboutHtml();
          setActiveBtnGroupBtn(this.mTabBtnInfo[0][0]);
        },
        methods: {
          btnEvent(event) {
            var id = event.target.id;
            switch(id) {
              case this.mTabBtnInfo[0][0]:
                this.mContentHtml = getAboutHtml();
                break;
              case this.mTabBtnInfo[1][0]:
                this.mContentHtml = getExpHtml();
                break;
              case this.mTabBtnInfo[2][0]:
	        this.mContentHtml = getAutobiographyHtml();
	        break;
              case this.mTabBtnInfo[3][0]:
                this.mContentHtml = getPortfolioHtml();
                break;
              default:
                break;
            }
            setActiveBtnGroupBtn(id);
          }
        }
      }).mount('#app');
    </script>
  </body>
</html>
